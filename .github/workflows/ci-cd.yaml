name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r demo/requirements.txt
          pip install flake8 pytest pytest-asyncio

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,.venv

      - name: Run tests
        run: |
          # Exit code 5 means pytest found no test files; treat that as success
          pytest --tb=short -q || { code=$?; [ $code -eq 5 ] && exit 0; exit $code; }

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: velocityhire:${{ github.sha }}

  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
      SERVICE_NAME: velocityhire

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required GCP secrets
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          failed=0
          [ -z "$WORKLOAD_IDENTITY_PROVIDER" ] && echo "::error::Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER" && failed=1
          [ -z "$SERVICE_ACCOUNT" ] && echo "::error::Missing secret: GCP_SERVICE_ACCOUNT" && failed=1
          [ -z "$PROJECT_ID" ] && echo "::error::Missing secret: GCP_PROJECT_ID" && failed=1
          if [ "$failed" = "1" ]; then
            echo "Add missing secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Compute image path
        run: |
          echo "IMAGE=${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${SERVICE_NAME}/${SERVICE_NAME}" >> "$GITHUB_ENV"

      - name: Show OIDC token claims (for WIF attribute condition debugging)
        run: |
          echo "repository:       ${{ github.repository }}"
          echo "ref:              ${{ github.ref }}"
          echo "actor:            ${{ github.actor }}"
          echo "workflow:         ${{ github.workflow }}"
          echo "event_name:       ${{ github.event_name }}"
          echo "---"
          echo "Expected WIF attribute condition:"
          echo "  attribute.repository == \"${{ github.repository }}\""

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${SERVICE_NAME} \
            --location=${GCP_REGION} --quiet 2>/dev/null || \
          gcloud artifacts repositories create ${SERVICE_NAME} \
            --repository-format=docker \
            --location=${GCP_REGION} \
            --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to Artifact Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --max-instances=10

      - name: Show deployed URL
        run: echo "✅ Service deployed to ${{ steps.deploy.outputs.url }}"
